<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>E-Ink Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">E-Ink Helper</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Timer</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="card shadow p-4">
      <h2 class="text-center mb-4">E-Ink Timer</h2>

      <div class="mb-3">
        <label class="form-label">Duration (seconds)</label>
        <input type="number" id="seconds" class="form-control" value="10" min="1">
      </div>

      <div class="d-grid gap-2">
        <button class="btn btn-primary" id="connectBtn" onclick="connect()">Connect Device</button>
        <button class="btn btn-success" id="startBtn" onclick="startTimer()" disabled>Start Timer</button>
        <button class="btn btn-danger"  id="clearBtn"  onclick="clearDisplay()" disabled>Clear Display</button>
      </div>

      <!-- Status line — hidden when empty -->
      <div class="mt-3 text-center" id="statusArea" style="display:none;">
        <span id="status"></span>
      </div>

      <!-- Connect code shown on connect -->
      <div class="mt-3 text-center" id="codeArea" style="display:none;">
        <p class="mb-1 text-muted small">Confirm this code on the device:</p>
        <span id="connectCode" class="fs-1 fw-bold font-monospace text-primary"></span>
      </div>

      <!-- Countdown shown while timer is running -->
      <div class="mt-3 text-center" id="countdownArea" style="display:none;">
        <span id="countdown" class="fs-1 fw-bold text-success"></span>
      </div>
    </div>
  </div>

<script>
let device;
let characteristic;
let timerRunning = false;
let countdownInterval = null;
let connected = false;

const SERVICE_UUID = "12345678-1234-5678-1234-56789abcdef0";
const CHAR_UUID    = "12345678-1234-5678-1234-56789abcdef1";

function setStatus(msg, colour) {
  const area = document.getElementById("statusArea");
  const el   = document.getElementById("status");
  if (!msg) {
    area.style.display = "none";
    el.innerText = "";
    el.className = "";
  } else {
    area.style.display = "block";
    el.innerText = msg;
    el.className = colour || "text-muted";
  }
}

function generateCode() {
  // 4-digit numeric code, zero-padded
  return String(Math.floor(Math.random() * 10000)).padStart(4, "0");
}

function setTimerRunning(running) {
  timerRunning = running;
  document.getElementById("startBtn").disabled = running || !connected;
  document.getElementById("startBtn").innerText = running ? "Timer Running…" : "Start Timer";
  if (!running) stopCountdown();
}

function startCountdown(seconds) {
  const area    = document.getElementById("countdownArea");
  const display = document.getElementById("countdown");
  let remaining = seconds;
  area.style.display = "block";
  display.innerText  = remaining + "s";

  countdownInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      countdownInterval = null;
      display.innerText = "Done!";
      setTimeout(() => {
        setTimerRunning(false);
        stopCountdown();
        setStatus("");   // clear status text when timer finishes
      }, 1500);
    } else {
      display.innerText = remaining + "s";
    }
  }, 1000);
}

function stopCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
  document.getElementById("countdownArea").style.display = "none";
  document.getElementById("countdown").innerText = "";
}

async function connect() {
  try {
    setStatus("Connecting…", "text-warning");
    document.getElementById("codeArea").style.display = "none";

    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHAR_UUID);
    connected = true;

    // Mark connected immediately — before sending the code
    document.getElementById("startBtn").disabled = false;
    document.getElementById("clearBtn").disabled = false;
    document.getElementById("connectBtn").innerText = "Reconnect";
    setStatus("Connected", "text-success");

    // Generate and show code on both sides
    const code = generateCode();
    document.getElementById("connectCode").innerText = code;
    document.getElementById("codeArea").style.display = "block";

    // Send code to Pi in its own try/catch — a slow e-ink init won't kill the connection
    try {
      await characteristic.writeValue(new TextEncoder().encode(`CONNECT:${code}`));
    } catch (codeErr) {
      console.warn("Code write failed (non-fatal):", codeErr);
    }

    // Hide the code after 6 seconds (Pi clears after 5)
    setTimeout(() => {
      document.getElementById("codeArea").style.display = "none";
    }, 6000);

    device.addEventListener("gattserverdisconnected", () => {
      characteristic = null;
      connected = false;
      document.getElementById("startBtn").disabled = true;
      document.getElementById("clearBtn").disabled = true;
      document.getElementById("codeArea").style.display = "none";
      setTimerRunning(false);
      setStatus("Disconnected", "text-danger");
    });

  } catch (error) {
    console.error(error);
    setStatus("Connection failed", "text-danger");
  }
}

async function startTimer() {
  if (!characteristic || timerRunning) return;

  const seconds = parseInt(document.getElementById("seconds").value);
  if (isNaN(seconds) || seconds <= 0) { alert("Enter a valid duration"); return; }

  try {
    await characteristic.writeValue(new TextEncoder().encode(`START:${seconds}`));
    setTimerRunning(true);
    setStatus(`Timer running: ${seconds}s`, "text-success");
    startCountdown(seconds);
  } catch (e) {
    console.error(e);
    setStatus("Failed to send command", "text-danger");
  }
}

async function clearDisplay() {
  if (!characteristic) return;

  try {
    setTimerRunning(false);
    setStatus("");   // clear status immediately on manual clear
    await characteristic.writeValue(new TextEncoder().encode("CLEAR"));
  } catch (e) {
    console.error(e);
    setStatus("Failed to send command", "text-danger");
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
