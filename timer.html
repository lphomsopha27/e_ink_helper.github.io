<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>E-Ink Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">E-Ink Helper</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Timer</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="card shadow p-4">
      <h2 class="text-center mb-4">E-Ink Timer</h2>

      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Hours</label>
          <input type="number" id="hours" class="form-control" value="0" min="0">
        </div>
        <div class="col">
          <label class="form-label">Minutes</label>
          <input type="number" id="minutes" class="form-control" value="5" min="0" max="59">
        </div>
      </div>

      <div class="d-grid gap-2">
        <button class="btn btn-primary" id="connectBtn" onclick="connect()">Connect via USB</button>
        <button class="btn btn-success" id="startBtn" onclick="startTimer()" disabled>Start Timer</button>
        <button class="btn btn-danger"  id="clearBtn"  onclick="clearDisplay()" disabled>Clear Display</button>
      </div>

      <!-- Status line -->
      <div class="mt-3 text-center" id="statusArea" style="display:none;">
        <span id="status"></span>
      </div>

      <!-- Connect code -->
      <div class="mt-3 text-center" id="codeArea" style="display:none;">
        <p class="mb-1 text-muted small">Confirm this code on the device:</p>
        <span id="connectCode" class="fs-1 fw-bold font-monospace text-primary"></span>
      </div>

      <p class="text-muted text-center mt-3 mb-0" style="font-size:0.75rem;">
        USB Serial connection · Chrome only
      </p>
    </div>
  </div>

<script>
let port = null;
let writer = null;
let reader = null;
let connected = false;
let timerRunning = false;
let readBuffer = "";

function setStatus(msg, colour) {
  const area = document.getElementById("statusArea");
  const el   = document.getElementById("status");
  if (!msg) {
    area.style.display = "none";
    el.innerText = "";
    el.className = "";
  } else {
    area.style.display = "block";
    el.innerText = msg;
    el.className = colour || "text-muted";
  }
}

function generateCode() {
  return String(Math.floor(Math.random() * 10000)).padStart(4, "0");
}

function setConnected(val) {
  connected = val;
  document.getElementById("startBtn").disabled = !val || timerRunning;
  document.getElementById("clearBtn").disabled = !val;
  document.getElementById("connectBtn").innerText = val ? "Reconnect" : "Connect via USB";
}

function setTimerRunning(val) {
  timerRunning = val;
  document.getElementById("startBtn").disabled = val || !connected;
  document.getElementById("startBtn").innerText = val ? "Timer Running…" : "Start Timer";
}

async function sendCommand(cmd) {
  if (!writer) return;
  await writer.write(new TextEncoder().encode(cmd + "\n"));
}

async function readLoop() {
  const decoder = new TextDecoder();
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      readBuffer += decoder.decode(value);
      const lines = readBuffer.split("\n");
      readBuffer = lines.pop();
      for (const line of lines) {
        const msg = line.trim();
        if (!msg) continue;
        console.log("Pi:", msg);
        if (msg === "OK:CLEARED") {
          setTimerRunning(false);
          setStatus("Display cleared", "text-muted");
        }
      }
    }
  } catch (e) {
    console.warn("Read loop ended:", e);
    handleDisconnect();
  }
}

function handleDisconnect() {
  connected = false;
  writer = null;
  reader = null;
  setConnected(false);
  setTimerRunning(false);
  setStatus("Disconnected — replug USB and reconnect", "text-danger");
}

async function connect() {
  try {
    setStatus("Waiting for port selection…", "text-warning");

    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    setConnected(true);
    setStatus("Connected via USB", "text-success");

    // Generate and show connect code
    const code = generateCode();
    document.getElementById("connectCode").innerText = code;
    document.getElementById("codeArea").style.display = "block";
    setTimeout(() => {
      document.getElementById("codeArea").style.display = "none";
    }, 6000);

    await sendCommand(`CONNECT:${code}`);

    readLoop();

    port.addEventListener("disconnect", handleDisconnect);

  } catch (e) {
    console.error(e);
    setStatus("Connection failed — is the Pi plugged in via USB?", "text-danger");
  }
}

async function startTimer() {
  if (!connected || timerRunning) return;

  const hours   = parseInt(document.getElementById("hours").value)   || 0;
  const minutes = parseInt(document.getElementById("minutes").value) || 0;
  const seconds = (hours * 3600) + (minutes * 60);

  if (seconds <= 0) { alert("Please set a duration greater than zero"); return; }

  await sendCommand(`START:${seconds}`);
  setTimerRunning(true);
  const label = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
  setStatus(`Timer running: ${label}`, "text-success");
}

async function clearDisplay() {
  if (!connected) return;
  setStatus("Clearing…", "text-muted");
  setTimerRunning(false);
  await sendCommand("CLEAR");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
