<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer — E-Ink Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #141412;
      --surface:   #1c1c1a;
      --border:    #2a2a26;
      --text:      #e8e4dc;
      --muted:     #6b6860;
      --accent:    #c9a96e;
      --accent-dim:#7a6340;
      --success:   #7eb89a;
      --danger:    #c97a6e;
      --warning:   #c9b96e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      color: var(--text);
      font-family: 'Inconsolata', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: fadein 1.2s ease forwards;
    }

    @keyframes fadein { to { opacity: 1; } }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px 36px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .card-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .card-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .card-header p {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .duration-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Inconsolata', monospace;
      font-size: 28px;
      font-weight: 400;
      padding: 10px 14px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field input:focus { border-color: var(--accent-dim); }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 13px 20px;
      border: 1px solid transparent;
      border-radius: 2px;
      font-family: 'Inconsolata', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
    }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button:active:not(:disabled) { opacity: 0.7; }

    .btn-connect {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-connect:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }

    .btn-start {
      background: transparent;
      color: var(--success);
      border-color: var(--success);
    }
    .btn-start:hover:not(:disabled) { background: rgba(126,184,154,0.08); }

    .btn-clear {
      background: transparent;
      color: var(--danger);
      border-color: var(--danger);
    }
    .btn-clear:hover:not(:disabled) { background: rgba(201,122,110,0.08); }

    .status {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-align: center;
      color: var(--muted);
      min-height: 16px;
    }
    .status.success { color: var(--success); }
    .status.danger  { color: var(--danger); }
    .status.warning { color: var(--warning); }

    .code-area {
      display: none;
      text-align: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px;
    }
    .code-area p {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .code-area span {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.2em;
    }

    footer {
      padding: 20px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">E-Ink Helper</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="timer.html" class="active">Timer</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="card">

      <div class="card-header">
        <h1>Session Timer</h1>
        <p>USB Serial · Chrome only</p>
      </div>

      <div class="duration-row">
        <div class="field">
          <label>Hours</label>
          <input type="number" id="hours" value="0" min="0">
        </div>
        <div class="field">
          <label>Minutes</label>
          <input type="number" id="minutes" value="5" min="0" max="59">
        </div>
      </div>

      <div class="actions">
        <button class="btn-connect" id="connectBtn" onclick="connect()">Connect via USB</button>
        <button class="btn-start"   id="startBtn"   onclick="startTimer()" disabled>Start Session</button>
        <button class="btn-clear"   id="clearBtn"   onclick="clearDisplay()" disabled>Clear Display</button>
      </div>

      <div class="status" id="status"></div>

      <div class="code-area" id="codeArea">
        <p>Confirm on device</p>
        <span id="connectCode"></span>
      </div>

    </div>
  </div>

  <footer>E-Ink Helper &nbsp;·&nbsp; Raspberry Pi Zero W</footer>

<script>
let port = null;
let writer = null;
let reader = null;
let connected = false;
let timerRunning = false;
let readBuffer = "";

function setStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status" + (type ? ` ${type}` : "");
}

function generateCode() {
  return String(Math.floor(Math.random() * 10000)).padStart(4, "0");
}

function setConnected(val) {
  connected = val;
  document.getElementById("startBtn").disabled = !val || timerRunning;
  document.getElementById("clearBtn").disabled = !val;
  document.getElementById("connectBtn").textContent = val ? "Reconnect" : "Connect via USB";
}

function setTimerRunning(val) {
  timerRunning = val;
  document.getElementById("startBtn").disabled = val || !connected;
  document.getElementById("startBtn").textContent = val ? "Session Running…" : "Start Session";
}

async function sendCommand(cmd) {
  if (!writer) return;
  await writer.write(new TextEncoder().encode(cmd + "\n"));
}

async function readLoop() {
  const decoder = new TextDecoder();
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      readBuffer += decoder.decode(value);
      const lines = readBuffer.split("\n");
      readBuffer = lines.pop();
      for (const line of lines) {
        const msg = line.trim();
        if (!msg) continue;
        console.log("Pi:", msg);
        if (msg === "OK:CLEARED") {
          setTimerRunning(false);
          setStatus("Display cleared");
        }
      }
    }
  } catch (e) {
    console.warn("Read loop ended:", e);
    handleDisconnect();
  }
}

function handleDisconnect() {
  connected = false;
  writer = null;
  reader = null;
  setConnected(false);
  setTimerRunning(false);
  setStatus("Disconnected — replug USB and reconnect", "danger");
}

async function connect() {
  try {
    setStatus("Waiting for port…", "warning");
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });

    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    setConnected(true);
    setStatus("Connected via USB", "success");

    const code = generateCode();
    document.getElementById("connectCode").textContent = code;
    document.getElementById("codeArea").style.display = "block";
    setTimeout(() => {
      document.getElementById("codeArea").style.display = "none";
    }, 6000);

    await sendCommand(`CONNECT:${code}`);
    readLoop();
    port.addEventListener("disconnect", handleDisconnect);

  } catch (e) {
    console.error(e);
    setStatus("Connection failed — is the Pi plugged in?", "danger");
  }
}

async function startTimer() {
  if (!connected || timerRunning) return;
  const hours   = parseInt(document.getElementById("hours").value)   || 0;
  const minutes = parseInt(document.getElementById("minutes").value) || 0;
  const seconds = (hours * 3600) + (minutes * 60);
  if (seconds <= 0) { alert("Set a duration greater than zero"); return; }

  await sendCommand(`START:${seconds}`);
  setTimerRunning(true);
  const label = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
  setStatus(`Session running · ${label}`, "success");
}

async function clearDisplay() {
  if (!connected) return;
  setTimerRunning(false);
  setStatus("Clearing…", "warning");
  await sendCommand("CLEAR");
}
</script>
</body>
</html>
