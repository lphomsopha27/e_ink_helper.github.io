<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>E-Ink Timer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">E-Ink Helper</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="#">Timer</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="card shadow p-4">
      <h2 class="text-center mb-4">E-Ink Timer</h2>

      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Hours</label>
          <input type="number" id="hours" class="form-control" value="0" min="0">
        </div>
        <div class="col">
          <label class="form-label">Minutes</label>
          <input type="number" id="minutes" class="form-control" value="5" min="0" max="59">
        </div>
      </div>

      <div class="d-grid gap-2">
        <button class="btn btn-primary" id="connectBtn" onclick="connect()">Connect Device</button>
        <button class="btn btn-success" id="startBtn" onclick="startTimer()" disabled>Start Timer</button>
        <button class="btn btn-danger"  id="clearBtn"  onclick="clearDisplay()" disabled>Clear Display</button>
      </div>

      <!-- Status line — hidden when empty -->
      <div class="mt-3 text-center" id="statusArea" style="display:none;">
        <span id="status"></span>
      </div>

      <!-- Connect code shown on connect -->
      <div class="mt-3 text-center" id="codeArea" style="display:none;">
        <p class="mb-1 text-muted small">Confirm this code on the device:</p>
        <span id="connectCode" class="fs-1 fw-bold font-monospace text-primary"></span>
      </div>
    </div>
  </div>

<script>
let device;
let characteristic;
let timerRunning = false;
let connected = false;

const SERVICE_UUID = "12345678-1234-5678-1234-56789abcdef0";
const CHAR_UUID    = "12345678-1234-5678-1234-56789abcdef1";

function setStatus(msg, colour) {
  const area = document.getElementById("statusArea");
  const el   = document.getElementById("status");
  if (!msg) {
    area.style.display = "none";
    el.innerText = "";
    el.className = "";
  } else {
    area.style.display = "block";
    el.innerText = msg;
    el.className = colour || "text-muted";
  }
}

function generateCode() {
  return String(Math.floor(Math.random() * 10000)).padStart(4, "0");
}

function setTimerRunning(running) {
  timerRunning = running;
  document.getElementById("startBtn").disabled = running || !connected;
  document.getElementById("startBtn").innerText = running ? "Timer Running…" : "Start Timer";
}

let keepAliveInterval = null;
let sendingCommand = false;

function startKeepAlive() { /* no-op — removed, was causing disconnects */ }
function stopKeepAlive() {
  if (keepAliveInterval) {
    clearInterval(keepAliveInterval);
    keepAliveInterval = null;
  }
}

function stopKeepAlive() {
  if (keepAliveInterval) {
    clearInterval(keepAliveInterval);
    keepAliveInterval = null;
  }
}

async function connectToDevice() {
  const server  = await device.gatt.connect();
  const service = await server.getPrimaryService(SERVICE_UUID);
  characteristic = await service.getCharacteristic(CHAR_UUID);
  connected = true;

  document.getElementById("startBtn").disabled = false;
  document.getElementById("clearBtn").disabled = false;
  document.getElementById("connectBtn").innerText = "Reconnect";
  setStatus("Connected", "text-success");
  startKeepAlive();
}

async function connect() {
  try {
    setStatus("Connecting…", "text-warning");
    document.getElementById("codeArea").style.display = "none";

    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });

    await connectToDevice();

    const code = generateCode();
    document.getElementById("connectCode").innerText = code;
    document.getElementById("codeArea").style.display = "block";

    try {
      await characteristic.writeValue(new TextEncoder().encode(`CONNECT:${code}`));
    } catch (e) {
      console.warn("Code write failed (non-fatal):", e);
    }

    setTimeout(() => {
      document.getElementById("codeArea").style.display = "none";
    }, 6000);

    device.addEventListener("gattserverdisconnected", async () => {
      characteristic = null;
      connected = false;
      stopKeepAlive();
      document.getElementById("startBtn").disabled = true;
      document.getElementById("clearBtn").disabled = true;
      document.getElementById("codeArea").style.display = "none";
      setTimerRunning(false);
      setStatus("Reconnecting…", "text-warning");

      // Auto-reconnect loop
      for (let i = 0; i < 5; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          await connectToDevice();
          setStatus("Reconnected", "text-success");
          return;
        } catch (e) {
          console.warn(`Reconnect attempt ${i + 1} failed:`, e);
        }
      }
      setStatus("Disconnected — tap Reconnect", "text-danger");
    });

  } catch (error) {
    console.error(error);
    setStatus("Connection failed", "text-danger");
  }
}

async function startTimer() {
  if (!characteristic || timerRunning) return;

  const hours   = parseInt(document.getElementById("hours").value)   || 0;
  const minutes = parseInt(document.getElementById("minutes").value) || 0;
  const seconds = (hours * 3600) + (minutes * 60);

  if (seconds <= 0) { alert("Please set a duration greater than zero"); return; }

  try {
    sendingCommand = true;
    await characteristic.writeValue(new TextEncoder().encode(`START:${seconds}`));
    setTimerRunning(true);
    const label = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
    setStatus(`Timer running: ${label}`, "text-success");
  } catch (e) {
    console.error(e);
    setStatus("Failed to send command", "text-danger");
  } finally {
    sendingCommand = false;
  }
}

async function clearDisplay() {
  if (!characteristic) return;

  try {
    sendingCommand = true;
    setTimerRunning(false);
    setStatus("");
    await characteristic.writeValue(new TextEncoder().encode("CLEAR"));
  } catch (e) {
    console.error(e);
    setStatus("Failed to send command", "text-danger");
  } finally {
    sendingCommand = false;
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
