<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Ink Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #141412;
      --surface:   #1c1c1a;
      --border:    #2a2a26;
      --text:      #e8e4dc;
      --muted:     #6b6860;
      --accent:    #c9a96e;
      --accent-dim:#7a6340;
      --success:   #7eb89a;
      --danger:    #c97a6e;
      --warning:   #c9b96e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      color: var(--text);
      font-family: 'Inconsolata', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: fadein 1.2s ease forwards;
    }

    @keyframes fadein {
      to { opacity: 1; }
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--accent); }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      gap: 24px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
      max-width: 640px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero p {
      font-size: 14px;
      color: var(--muted);
      max-width: 400px;
      line-height: 1.8;
      letter-spacing: 0.03em;
    }

    .cta {
      display: inline-block;
      margin-top: 12px;
      padding: 14px 36px;
      background: transparent;
      border: 1px solid var(--accent-dim);
      border-radius: 2px;
      color: var(--accent);
      font-family: 'Inconsolata', monospace;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .cta:hover {
      background: rgba(201, 169, 110, 0.08);
      border-color: var(--accent);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto;
    }

    footer {
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-brand" href="index.html">E-Ink Helper</a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="timer.html">Timer</a></li>
    </ul>
  </nav>

  <div class="hero">
    <span class="eyebrow">Focus Tool</span>
    <h1>Less distraction.<br><em>More presence.</em></h1>
    <div class="divider"></div>
    <p>A distraction-free timer for your study sessions, rendered on e-ink so it never competes for your attention.</p>
    <a href="timer.html" class="cta">Open Timer</a>
  </div>

  <footer>E-Ink Helper &nbsp;·&nbsp; USB Serial &nbsp;·&nbsp; Chrome only</footer>
</body>
</html>
